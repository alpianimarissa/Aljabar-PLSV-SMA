    <script>
        // --- 1. SOUND EFFECT SYNTHESIZER (Web Audio API) ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(130, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(65, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio synthesized successfully.");
            }
        }

            // Slide 31: Soal 16
            {
                section: "Drill Soal Cerita",
                title: "Kasus 16: Geometri Keliling Lapangan Bola",
                subtitle: "Membatasi dimensi panjang lebar arena",
                icon: "💼",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sebuah lapangan bola berbentuk persegi panjang memiliki keliling <strong>60 meter</strong>. Jika panjang lapangan adalah <strong>6 meter lebih dari lebarnya</strong>, berapakah lebar lapangan tersebut?</p>
                        <div class="grid grid-cols-2 gap-3 max-w-md mx-auto" id="options-s31"></div>
                    </div>
                `,
                isQuiz: true,
                options: ["12 meter", "18 meter", "10 meter", "15 meter"],
                correct: "12 meter",
                explanation: "K = 2(p + l) -> 60 = 2((l+6) + l) -> 30 = 2l + 6 -> 2l = 24 -> l = 12 meter."
            },
            // Slide 32: Soal 17
            {
                section: "Drill Soal Cerita",
                title: "Kasus 17: Alokasi Bahan Baku Produksi",
                subtitle: "Tantangan pemodelan batas operasional pabrik",
                icon: "💼",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sebuah pabrik roti mengalokasikan <strong>100 kg tepung terigu</strong> untuk membuat roti manis dan donat. Roti manis butuh <strong>2 kg</strong> per nampan dan donat butuh <strong>3 kg</strong> per nampan. Jika jumlah nampan donat yang dibuat adalah <strong>10 nampan lebih banyak</strong> dari nampan roti manis, berapa banyak nampan roti manis yang diproduksi?</p>
                        <div class="grid grid-cols-2 gap-3 max-w-md mx-auto" id="options-s32"></div>
                    </div>
                `,
                isQuiz: true,
                options: ["14 nampan", "12 nampan", "15 nampan", "20 nampan"],
                correct: "14 nampan",
                explanation: "Misal roti manis = x nampan, maka donat = x + 10 nampan. 2x + 3(x + 10) = 100 -> 2x + 3x + 30 = 100 -> 5x = 70 -> x = 14 nampan."
            },

            // Slide 33: Evaluasi Mandiri Kilat
            {
                section: "Evaluasi Mandiri",
                title: "Uji Evaluasi Refleks Aljabar",
                subtitle: "Kecepatan menghitung tanpa coretan",
                icon: "⚡",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Selesaikan persamaan linear ini secepat mungkin di dalam pikiranmu:<br><strong class="text-emerald-600 font-mono text-base">$3x - 1 = 2x + 5$</strong></p>
                        <div class="grid grid-cols-3 gap-2 max-w-xs mx-auto">
                            <button onclick="checkSlideAnswer(this, true, 'Hebat! Kurangkan 2x dari kedua sisi: x - 1 = 5 -> x = 6.', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">x = 6</button>
                            <button onclick="checkSlideAnswer(this, false, 'Salah.', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">x = 4</button>
                            <button onclick="checkSlideAnswer(this, false, 'Kurang tepat.', 10)" class="bg-[#F3F4F6] hover:bg-gray-100 p-2.5 rounded-xl border text-xs font-bold font-mono">x = 2</button>
                        </div>
                    </div>
                `
            },
            // Slide 34: Refleksi Profil Pelajar Pancasila
            {
                section: "Refleksi",
                title: "Bagaimana Pemahaman Dirimu?",
                subtitle: "Kemandirian & Bernalar Kritis Kurikulum Merdeka",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm font-bold text-gray-600 mb-6">Pilih salah satu ikon yang mewakili kesiapanmu hari ini:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleEmotionSelect(this, 'paham')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">😎</span>
                                <span class="text-xs font-bold text-gray-600">Sangat Paham</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'latihan')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🤔</span>
                                <span class="text-xs font-bold text-gray-600">Butuh Latihan</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'siap')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🔥</span>
                                <span class="text-xs font-bold text-gray-600">Siap Ujian!</span>
                            </button>
                        </div>
                        <p id="emotion-feedback" class="text-xs font-bold text-[#059669] mt-6 min-h-[16px]"></p>
                    </div>
                `
            },
            // Slide 35: Kesimpulan / Penutup
            {
                section: "Kesimpulan",
                title: "Misi PLSV Masterclass Selesai!",
                subtitle: "Selamat, kamu resmi menguasai PLSV Medium-Hard!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#312E81] mb-1">Misi Selesai Dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Luar biasa! Kamu telah menuntaskan 35 slide tantangan interaktif pengerjaan PLSV tingkat lanjut. Terus pertahankan ketajaman logikamu!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#6366F1] to-[#4F46E5] text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 ULANGI MISI ADVENTURE
                        </div>
                    </div>
                `
            }
        ];

        // --- 3. SYSTEM STATE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. SHUFFLE UTILITY ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- 5. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- 6. RENDER CONTROL SYSTEM ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#6366F1] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress Bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Arrow States
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // If it is a quiz slide (Slide 16-32) -> Render shuffled options and attach verification logic
            if (slide.isQuiz) {
                const optContainerId = `options-s${currentSlide + 1}`;
                const container = document.getElementById(optContainerId);
                if (container) {
                    const shuffledOpts = shuffleArray(slide.options);
                    container.innerHTML = '';
                    shuffledOpts.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-4 bg-indigo-50 hover:bg-indigo-100 border-2 border-indigo-200 rounded-xl text-xs md:text-sm font-bold text-indigo-900 transition btn-bounce flex justify-between items-center";
                        btn.innerHTML = `<span>${opt}</span><span class="opacity-50 text-[10px]">PILIH 👉</span>`;
                        btn.onclick = () => verifyAnswer(btn, opt, slide.correct, slide.explanation);
                        container.appendChild(btn);
                    });
                }
            }

            // Trigger Simulator Slide Action
            if (currentSlide === 13) { 
                setTimeout(updateScale, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 7. ANSWER VERIFICATION & FEEDBACKS ---
        function verifyAnswer(element, selected, correct, explanation) {
            // Find parent and freeze option buttons
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50');
            });

            const isCorrect = selected === correct;

            if (isCorrect) {
                element.classList.remove('opacity-50');
                element.classList.add('border-emerald-500', 'bg-emerald-100', 'text-emerald-800');
                element.innerHTML = `<span>${selected}</span> <span>🎉 BENAR!</span>`;
                playSound('correct');
                showToast("✨ Keren! Trik cepat: " + explanation, "bg-[#10B981]");
                score += 15;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.remove('opacity-50');
                element.classList.add('border-red-400', 'bg-red-100', 'text-red-800');
                element.innerHTML = `<span>${selected}</span> <span>❌ SALAH!</span>`;
                playSound('incorrect');
                showToast("💡 Cakar kembali! Pembahasan: " + explanation, "bg-red-500");
            }
        }

        // Generic slide checker (for simple non-quiz checkbuttons)
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#6366F1]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#6366F1]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'paham') {
                feedbackText.innerText = "Luar biasa! Operasi pindah ruas pecahan aljabar lanjut dan kurung distributif bertingkat telah kamu kuasai secara utuh! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'latihan') {
                feedbackText.innerText = "Semangat! Gunakan tombol 'Papan Cakar' di pojok kanan atas untuk melatih coret-coret persamaan aljabar kembali! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Sangat Hebat! Jiwa analisismu siap menghadapi ujian aljabar tingkat lanjut dengan percaya diri! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3.5 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerHTML = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 5000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- 8. DYNAMIC TIMBANGAN ALJABAR SIMULATOR (Slide 14) ---
        function updateScale() {
            const leftVal = parseInt(document.getElementById('scale-l-slider').value);
            const rightVal = parseInt(document.getElementById('scale-r-slider').value);

            document.getElementById('scale-l-val').innerText = leftVal;
            document.getElementById('scale-r-val').innerText = rightVal;

            // $2x + B = x + D \iff x = D - B$
            const solution = rightVal - leftVal;
            document.getElementById('scale-solution').innerText = `$x = ${solution}$`;

            const beam = document.getElementById('scale-beam');
            const plateL = document.getElementById('scale-plate-l');
            const plateR = document.getElementById('scale-plate-r');

            // Visual balance/tilt calculation based on values
            let angle = (leftVal - rightVal) * 2.5; 
            if (angle > 15) angle = 15;
            if (angle < -15) angle = -15;

            // Apply SVG transforms for visual tilt
            beam.setAttribute('transform', `rotate(${angle}, 50, 60)`);

            const rad = angle * Math.PI / 180;
            const leftX = 50 - 35 * Math.cos(rad);
            const leftY = 60 - 35 * Math.sin(rad);
            const rightX = 50 + 35 * Math.cos(rad);
            const rightY = 60 + 35 * Math.sin(rad);

            plateL.setAttribute('cx', leftX);
            plateL.setAttribute('cy', leftY);
            plateR.setAttribute('cx', rightX);
            plateR.setAttribute('cy', rightY);

            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // --- 9. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#6366F1'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 10. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- 11. CONFETTI CELEBRATION EFFECTS ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
