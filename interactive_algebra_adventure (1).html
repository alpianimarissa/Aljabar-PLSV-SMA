    <script>
        // --- 1. WEB AUDIO API SYNTHESIZER ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); 
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio requires user gesture first.");
            }
        }

            },
            // Slide 30: Kesimpulan
            {
                section: "Kesimpulan",
                title: "Misi Aljabar Selesai!",
                subtitle: "You are officially an Algebra Master!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#4C1D95] mb-1">Misi Selesai dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Luar biasa! Kamu telah melintasi dan menuntaskan 30 slide tantangan interaktif Aljabar Kelas 11 SMA. Pertahankan ketajaman analisismu!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#8B5CF6] to-[#6D28D9] text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 ULANGI PETUALANGAN
                        </div>
                    </div>
                `
            }
        ];

        // --- 3. SYSTEM STATE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad Context
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- 5. RENDER CONTROL SYSTEM ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#8B5CF6] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span>
                        <span>${slide.title}</span>
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress Bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Arrow States
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // Trigger Simulator Slide Action
            if (currentSlide === 21) { 
                setTimeout(drawQuadratic, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 6. USER INTERACTION & VALIDATION ---
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#8B5CF6]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#8B5CF6]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'paham') {
                feedbackText.innerText = "Luar biasa! Operasi pindah ruas linear dan penemuan faktor persamaan kuadrat sudah kamu kuasai secara mantap! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'latihan') {
                feedbackText.innerText = "Semangat! Gunakan tombol 'Papan Cakar' di pojok kanan atas untuk berlatih corat-coret rumus aljabar kembali! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Sangat Hebat! Jiwa analisismu siap menghadapi ujian aljabar SMA dengan percaya diri! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerHTML = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- 7. DYNAMIC QUADRATIC EXPLORER ---
        function drawQuadratic() {
            const a = parseFloat(document.getElementById('range-a').value);
            const b = parseFloat(document.getElementById('range-b').value);
            const c = parseFloat(document.getElementById('range-c').value);

            // Update Label texts
            document.getElementById('val-a').innerText = a;
            document.getElementById('val-b').innerText = b;
            document.getElementById('val-c').innerText = c;

            // Calculate Discriminant
            const D = (b * b) - (4 * a * c);
            document.getElementById('d-display').innerText = D;

            // Update status text
            const rootsStatus = document.getElementById('roots-status');
            if (a === 0) {
                rootsStatus.innerText = "Grafik Linear (Bukan Parabola Kuadrat)!";
                rootsStatus.className = "text-amber-600 font-bold block text-xs mt-1";
            } else if (D > 0) {
                rootsStatus.innerText = "Memiliki 2 Akar Real Berbeda!";
                rootsStatus.className = "text-emerald-600 font-bold block text-xs mt-1";
            } else if (D === 0) {
                rootsStatus.innerText = "Memiliki 1 Akar Real Kembar (Menyinggung)!";
                rootsStatus.className = "text-blue-600 font-bold block text-xs mt-1";
            } else {
                rootsStatus.innerText = "Tidak Memiliki Akar Real (Imajiner/Mengambang)!";
                rootsStatus.className = "text-red-500 font-bold block text-xs mt-1";
            }

            // Draw SVG Curve Path
            const mapX = (x) => 50 + x * 8;
            const mapY = (y) => 50 - y * 4; 

            let pathD = "";
            for (let x = -5; x <= 5; x += 0.2) {
                const y = a * x * x + b * x + c;
                const sx = mapX(x);
                const sy = mapY(y);
                const boundedSy = Math.max(5, Math.min(95, sy));
                
                if (x === -5) {
                    pathD += `M ${sx} ${boundedSy}`;
                } else {
                    pathD += ` L ${sx} ${boundedSy}`;
                }
            }
            document.getElementById('svg-parabola').setAttribute('d', pathD);
        }

        // --- 8. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        // --- 9. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- 10. CONFETTI CELEBRATION SYSTEM ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
