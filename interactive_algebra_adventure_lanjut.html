<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petualangan Aljabar Lanjut Kelas 11 SMA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- MathJax Configuration for Clean Formula Rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .heading-font {
            font-family: 'Fredoka', sans-serif;
        }
        .math-font {
            font-family: 'JetBrains Mono', monospace;
        }
        .slide-transition {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#F5F3FF] via-[#F3F4F6] to-[#ECFDF5] min-h-screen flex flex-col justify-between overflow-x-hidden select-none">

    <!-- HEADER NAVIGATION BAR -->

        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-[#8B5CF6] animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            </svg>
            <div>

        <div class="flex items-center gap-3">
            <!-- XP Badge -->
            <div class="bg-[#F5F3FF] border-2 border-[#8B5CF6] rounded-full px-4 py-1.5 flex items-center gap-1.5 shadow-sm">
                <span class="text-base">💎</span>
                <span id="score-display" class="font-bold text-[#6D28D9] text-xs md:text-sm">0 XP</span>
            </div>
            
            <!-- Scratchpad Toggle -->
            <button id="scratchpad-btn" onclick="toggleScratchpad()" class="bg-[#ECFDF5] hover:bg-[#D1FAE5] border-2 border-[#10B981] active:scale-95 transition text-[#047857] font-black rounded-full px-4 py-1.5 text-xs md:text-sm shadow-sm flex items-center gap-1">
                ✏️ <span>Papan Cakar</span>
            </button>
        </div>
    </header>

    <!-- SCRATCHPAD DRAWING OVERLAY -->
    <div id="scratchpad" class="hidden fixed inset-0 z-50 bg-white/95 flex flex-col p-4">
        <div class="flex justify-between items-center mb-2 border-b-2 border-gray-100 pb-2">
            <h3 class="heading-font text-lg font-bold text-[#6D28D9] flex items-center gap-2">
                ✏️ Papan Cakar Aljabar (Horner & Substitusi)
            </h3>
            <div class="flex items-center gap-2">
                <button onclick="clearCanvas()" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-1.5 rounded-xl text-xs">Bersihkan</button>
                <button onclick="toggleScratchpad()" class="bg-[#8B5CF6] hover:bg-[#7C3AED] text-white font-bold px-4 py-1.5 rounded-xl text-xs">Kembali ke Slide</button>
            </div>
        </div>
        <div class="flex-1 bg-violet-50/20 border-4 border-dashed border-[#A78BFA] rounded-2xl relative cursor-crosshair overflow-hidden">
            <canvas id="scratch-canvas" class="absolute inset-0 w-full h-full"></canvas>
        </div>
        <p class="text-xs text-gray-400 mt-2 text-center">Gunakan stylus, jari, atau mouse untuk mencakar pembagian Horner langsung di layar!</p>
    </div>

    <!-- MAIN SLIDE CONTAINER -->
    <main class="flex-1 flex items-center justify-center p-4 relative my-4">
        <!-- Prev Arrow -->
        <button id="prev-btn" onclick="changeSlide(-1)" class="absolute left-2 md:left-6 z-30 bg-white hover:bg-[#F5F3FF] text-[#8B5CF6] border-4 border-[#C7D2FE] w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-md active:scale-90 transition">
            ◀
        </button>

        <!-- Slide Body wrapper -->
        <div id="slide-wrapper" class="w-full max-w-4xl bg-white rounded-3xl border-8 border-[#C7D2FE] shadow-xl overflow-hidden flex flex-col justify-between min-h-[520px] md:min-h-[580px] slide-transition">
            <!-- Top Progress Bar -->
            <div class="w-full bg-[#EEF2FF] h-3">
                <div id="progress-bar" class="bg-[#8B5CF6] h-full transition-all duration-300" style="width: 3.3%"></div>
            </div>

            <!-- Dynamic Content Area -->
            <div id="slide-content" class="p-6 md:p-10 flex-1 flex flex-col justify-center overflow-y-auto max-h-[460px] md:max-h-[510px]">
                <!-- Loaded dynamically by Javascript -->
            </div>

            <!-- Footer Status Badge -->
            <div class="bg-[#F5F3FF] border-t-2 border-[#E0E7FF] px-6 py-3 flex justify-between items-center text-xs md:text-sm font-bold text-[#4F46E5]">

                <span id="slide-index" class="bg-[#8B5CF6] text-white px-3 py-1 rounded-full">Slide 1 / 30</span>
            </div>
        </div>

        <!-- Next Arrow -->
        <button id="next-btn" onclick="changeSlide(1)" class="absolute right-2 md:right-6 z-30 bg-white hover:bg-[#F5F3FF] text-[#8B5CF6] border-4 border-[#C7D2FE] w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-md active:scale-90 transition">
            ▶
        </button>
    </main>

    <!-- FLOATING TOAST NOTIFICATION -->
    <div id="toast" class="hidden fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 bg-[#10B981] text-white font-bold px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce">
        <span id="toast-icon">✨</span> <span id="toast-text">Luar biasa! Penyelesaianmu tepat!</span>
    </div>

    <!-- CONFETTI CELEBRATION CANVAS -->
    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50 w-full h-full hidden"></canvas>

    <!-- MAIN JAVASCRIPT & SLIDE DATABASE -->
    <script>
        // --- 1. SOUND EFFECT SYNTHESIZER ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); 
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio not initialized yet.");
            }
        }

        // --- 2. THE 30 DYNAMIC SLIDES (LaTeX Escaped) ---
        const slides = [
            // Slide 1: Cover
            {
                section: "Tuning In",
                title: "Petualangan Aljabar Lanjut: Polinomial & Fungsi",
                subtitle: "Eksplorasi Pencarian Nilai Suku Banyak & Komposisi • Kurikulum Merdeka",
                icon: "🚀",
                render: () => `
                    <div class="text-center">
                        <div class="flex justify-center mb-4">
                            <!-- SVG Polynomial Curve Representation -->
                            <svg class="w-32 h-32 text-[#8B5CF6] animate-pulse" viewBox="0 0 100 100" fill="none">
                                <line x1="5" y1="50" x2="95" y2="50" stroke="#CBD5E1" stroke-width="2"/>
                                <line x1="50" y1="5" x2="50" y2="95" stroke="#CBD5E1" stroke-width="2"/>
                                <path d="M 10 90 Q 30 10, 50 50 T 90 10" stroke="#8B5CF6" stroke-width="5" fill="none" stroke-linecap="round"/>
                                <circle cx="50" cy="50" r="5" fill="#EF4444" />
                                <text x="56" y="47" fill="#EF4444" font-family="'JetBrains Mono'" font-size="8" font-weight="bold">Akar Real</text>
                            </svg>
                        </div>
                        <h2 class="heading-font text-3xl md:text-5xl font-extrabold text-[#4C1D95] mb-2">Eksplorasi Aljabar Lanjut</h2>
                        <p class="text-base md:text-lg text-violet-700 font-bold mb-6">Memantapkan Kemampuan Mencari Nilai Persamaan Polinomial & Fungsi</p>
                        <div class="inline-block bg-[#F5F3FF] border-2 border-dashed border-[#A78BFA] rounded-2xl p-4 max-w-lg mx-auto">
                            <p class="text-xs md:text-sm text-violet-900 font-semibold">Selamat datang, para pemikir kritis kelas 11! Bersiaplah memperluas cakrawala logika aljabar SMA dalam penyelesaian fungsi lanjut.</p>
                        </div>
                    </div>
                `
            },
            // Slide 2: Tujuan Pembelajaran
            {
                section: "Tuning In",
                title: "Target & Tujuan Pembelajaran",
                subtitle: "Capaian Pembelajaran Aljabar Fase F",
                icon: "🎯",
                render: () => `
                    <div class="max-w-2xl mx-auto">
                        <p class="text-sm text-gray-500 font-bold mb-4">Setelah menuntaskan misi aljabar ini, kamu akan mampu:</p>
                        <ul class="space-y-3 text-xs md:text-sm">
                            <li class="bg-violet-50 border-l-8 border-[#8B5CF6] p-3 rounded-r-xl font-bold text-violet-950 flex items-center gap-3">
                                <span class="text-lg">✓</span> Menentukan nilai polinomial menggunakan metode Substitusi langsung dan Skema Horner.
                            </li>
                            <li class="bg-emerald-50 border-l-8 border-[#10B981] p-3 rounded-r-xl font-bold text-emerald-950 flex items-center gap-3">
                                <span class="text-lg">✓</span> Memanfaatkan Teorema Sisa dan Teorema Faktor untuk mencari akar-akar persamaan suku banyak.
                            </li>
                            <li class="bg-blue-50 border-l-8 border-[#3B82F6] p-3 rounded-r-xl font-bold text-blue-950 flex items-center gap-3">
                                <span class="text-lg">✓</span> Menemukan nilai tak diketahui pada fungsi komposisi $(f \\circ g)(x)$ dan fungsi invers $f^{-1}(x)$.
                            </li>
                        </ul>
                    </div>
                `
            },
            // Slide 3: Peta Jalan Belajar
            {
                section: "Tuning In",
                title: "Peta Jalan Petualangan",
                subtitle: "Rute Menuju Penguasaan Aljabar Lanjut",
                icon: "🗺️",
                render: () => `
                    <div class="w-full">
                        <p class="text-sm text-center text-gray-500 font-bold mb-6">Tuntaskan setiap pos penting di bawah ini:</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-violet-50 p-4 rounded-2xl border-2 border-violet-200 text-center">
                                <span class="text-3xl">🧩</span>
                                <h4 class="font-bold text-violet-800 text-xs mt-2">1. Warm-Up & Analogi</h4>
                            </div>
                            <div class="bg-emerald-50 p-4 rounded-2xl border-2 border-emerald-200 text-center">
                                <span class="text-3xl">📈</span>
                                <h4 class="font-bold text-emerald-800 text-xs mt-2">2. Konsep Polinomial</h4>
                            </div>
                            <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 text-center">
                                <span class="text-3xl">🔄</span>
                                <h4 class="font-bold text-blue-800 text-xs mt-2">3. Komposisi & Invers</h4>
                            </div>
                            <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-200 text-center">
                                <span class="text-3xl">🏆</span>
                                <h4 class="font-bold text-red-800 text-xs mt-2">4. Tantangan HOTS</h4>
                            </div>
                        </div>
                    </div>
                `
            },
            // Slide 4: Warm-up 1
            {
                section: "Warm-Up",
                title: "Teka-teki Pemfaktoran Kuadrat",
                subtitle: "Mengingat kembali dasar Aljabar Kelas 10",
                icon: "🧩",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sebelum masuk ke pangkat 3 atau lebih, temukan akar positif dari persamaan kuadrat berikut:<br><strong class="text-violet-600 font-mono text-lg">$x^2 - 5x - 14 = 0$</strong></p>
                        <div class="grid grid-cols-3 gap-3 max-w-md mx-auto">
                            <button onclick="checkSlideAnswer(this, false, 'Salah. Jumlah akar-akar harus positif 5.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">x = -2</button>
                            <button onclick="checkSlideAnswer(this, true, 'Sempurna! Pemfaktorannya adalah (x-7)(x+2) = 0. Akar positifnya adalah x = 7.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">x = 7</button>
                            <button onclick="checkSlideAnswer(this, false, 'Masih kurang tepat.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">x = 14</button>
                        </div>
                    </div>
                `
            },
            // Slide 5: Warm-up 2
            {
                section: "Warm-Up",
                title: "Mencari Nilai Fungsi Linear",
                subtitle: "Substitusi dasar koordinat",
                icon: "🔢",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Jika diketahui fungsi $f(x) = 3x - 5$ dan nilai $f(a) = 13$, berapakah nilai dari konstanta misterius $a$?</p>
                        <div class="grid grid-cols-3 gap-3 max-w-md mx-auto">
                            <button onclick="checkSlideAnswer(this, false, 'Jika a = 4, maka f(4) = 12 - 5 = 7.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">a = 4</button>
                            <button onclick="checkSlideAnswer(this, true, 'Hebat! 3a - 5 = 13 -> 3a = 18 -> a = 6.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">a = 6</button>
                            <button onclick="checkSlideAnswer(this, false, 'Coba hitung pemindahan ruas negatifnya dengan teliti.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">a = 8</button>
                        </div>
                    </div>
                `
            },
            // Slide 6: Warm-up 3
            {
                section: "Warm-Up",
                title: "Pola Pembagian Aljabar Sederhana",
                subtitle: "Arah awal menuju pembagian polinomial",
                icon: "⚙️",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sederhanakan bentuk pecahan aljabar berikut untuk nilai $x \\neq 3$:<br><strong class="text-emerald-600 font-mono text-lg">$$\\frac{x^2 - 9}{x - 3}$$</strong></p>
                        <div class="grid grid-cols-3 gap-3 max-w-md mx-auto">
                            <button onclick="checkSlideAnswer(this, false, 'Ingatlah rumus selisih dua kuadrat a² - b².', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">$x - 3$</button>
                            <button onclick="checkSlideAnswer(this, true, 'Sangat Hebat! Pembilang dijabarkan menjadi (x-3)(x+3). Pembagian dengan (x-3) menghasilkan x+3.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">$x + 3$</button>
                            <button onclick="checkSlideAnswer(this, false, 'Bukan, x²-9 tidak bisa langsung dibagi per elemen.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">$x + 9$</button>
                        </div>
                    </div>
                `
            },
            // Slide 7: Real-world 1
            {
                section: "Koneksi Nyata",
                title: "Desain Kontainer & Volume Box",
                subtitle: "Penerapan polinomial pada arsitektur & logistik",
                icon: "📦",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-6 items-center">
                        <div>
                            <p class="text-sm text-gray-600 leading-relaxed font-semibold">
                                Dalam industri manufaktur kardus atau kontainer kargo, volume box dirancang menggunakan persamaan polinomial berderajat 3:
                                <br><br>
                                <strong class="text-violet-700 font-mono">$$V(x) = x(20 - 2x)(15 - 2x)$$</strong>
                                <br>
                                Mencari nilai $x$ agar volume kardus mencapai nilai tertentu membutuhkan kemampuan memecahkan persamaan polinomial dengan presisi tinggi!
                            </p>
                        </div>
                        <div class="flex justify-center bg-violet-50 p-4 rounded-2xl border-2 border-violet-200">
                            <!-- SVG Cardboard Box Design -->
                            <svg class="w-44 h-40" viewBox="0 0 100 80">
                                <path d="M 20 20 L 50 10 L 80 20 L 50 30 Z" fill="#FFE082" stroke="#FFB300" stroke-width="2"/>
                                <path d="M 20 20 L 20 60 L 50 70 L 50 30 Z" fill="#FFD54F" stroke="#FFB300" stroke-width="2"/>
                                <path d="M 80 20 L 80 60 L 50 70 L 50 30 Z" fill="#FFCA28" stroke="#FFB300" stroke-width="2"/>
                                <text x="12" y="42" fill="#B45309" font-size="8" font-weight="bold">x</text>
                                <text x="45" y="78" fill="#B45309" font-size="8" font-weight="bold">20-2x</text>
                            </svg>
                        </div>
                    </div>
                `
            },
            // Slide 8: Real-world 2
            {
                section: "Koneksi Nyata",
                title: "Kriptografi & Keamanan Data",
                subtitle: "Aplikasi fungsi invers pada enkripsi digital",
                icon: "🔐",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-6 items-center">
                        <div class="order-2 md:order-1 flex justify-center bg-emerald-50 p-4 rounded-2xl border-2 border-emerald-200">
                            <!-- Lock SVG -->
                            <svg class="w-36 h-36" viewBox="0 0 100 100">
                                <rect x="25" y="45" w="50" h="40" rx="8" fill="#10B981" stroke="#047857" stroke-width="3"/>
                                <path d="M 35 45 L 35 25 A 15 15 0 0 1 65 25 L 65 45" stroke="#047857" stroke-width="6" fill="none"/>
                                <circle cx="50" cy="60" r="6" fill="#FFF"/>
                            </svg>
                        </div>
                        <div class="order-1 md:order-2">
                            <p class="text-sm text-gray-600 leading-relaxed font-semibold">
                                Keamanan transaksi bank online atau kata sandi internet menggunakan prinsip fungsi aljabar satu-satu (*one-to-one function*):
                                <br><br>
                                • **Enkripsi (Kunci)**: Pesan dikodekan menggunakan fungsi matematika $f(x)$.
                                <br>
                                • **Dekripsi (Gembok)**: Pesan dibaca kembali oleh penerima menggunakan invers dari fungsi tersebut, $f^{-1}(x)$.
                            </p>
                        </div>
                    </div>
                `
            },
            // Slide 9: Real-world 3
            {
                section: "Koneksi Nyata",
                title: "Prediksi Tren Bisnis & Ekonomi",
                subtitle: "Analisis kurva tren untuk estimasi keuangan",
                icon: "📈",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm text-gray-600 mb-4 font-semibold">
                            Analis saham dan ekonom menggunakan fungsi polinomial pangkat banyak untuk memodelkan fluktuasi harga pasar atau keuntungan perusahaan sepanjang tahun.
                            <br><br>
                            Mencari nilai titik impas (*break-even point*) diperoleh dengan mencari akar-akar persilangan persamaan polinomial tersebut dengan garis keuntungan nol!
                        </p>
                        <div class="bg-amber-50 border border-amber-300 p-2.5 rounded-xl font-mono text-xs inline-block text-amber-700 font-bold">
                            $P(t) = -0.5t^3 + 4t^2 - 5t + 10$
                        </div>
                    </div>
                `
            },
            // Slide 10: Suku Banyak (Polinomial)
            {
                section: "Materi Polinomial",
                title: "Bentuk Umum Polinomial (Suku Banyak)",
                subtitle: "Mengenal derajat, koefisien, dan konstanta",
                icon: "📝",
                render: () => `
                    <div class="space-y-4 max-w-2xl mx-auto">
                        <p class="text-sm text-gray-600 leading-relaxed">
                            Polinomial (suku banyak) adalah pernyataan aljabar yang memiliki satu variabel berpangkat bilangan bulat positif.
                        </p>

            // Slide 27: Soal Cerita 3 & 4
            {
                section: "Soal Cerita",
                title: "Lintasan Peluru & Konversi Kurs Mata Uang",
                subtitle: "Fisika mekanika dan ekonomi keuangan",
                icon: "✈️",
                render: () => `
                    <div class="space-y-4">
                        <div class="bg-blue-50 border border-blue-200 p-3 rounded-xl">
                            <p class="text-xs font-bold text-blue-950">Soal Cerita 3: Tinggi Peluru Meriam</p>
                            <p class="text-[11px] text-gray-600">Tinggi peluru $h(t)$ dalam meter setelah diluncurkan selama $t$ detik dimodelkan oleh polinomial $h(t) = 40t - 5t^2$. Kapan peluru tersebut kembali menyentuh tanah ($h(t) = 0$)?</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="checkSlideAnswer(this, true, 'Hebat! 5t(8 - t) = 0 -> t = 8 detik.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">t = 8 detik</button>
                                <button onclick="checkSlideAnswer(this, false, 'Kurang tepat.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">t = 4 detik</button>
                            </div>
                        </div>
                        <div class="bg-purple-50 border border-purple-200 p-3 rounded-xl">
                            <p class="text-xs font-bold text-purple-950">Soal Cerita 4: Kurs Mata Uang Komposisi</p>
                            <p class="text-[11px] text-gray-600">Nilai penukaran Rupiah ke Dollar AS adalah $f(x) = \\frac{x}{15.000}$ dan penukaran Dollar ke Euro adalah $g(x) = 0.9x$. Jika kamu membawa uang Rp15.000.000,00, berapa nilai Euro yang didapat? (Komposisi $(g \\circ f)(x)$)</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="checkSlideAnswer(this, true, 'Tepat! f(15 juta) = 1.000 USD. Maka g(1000) = 0,9 * 1000 = 900 Euro.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">900 Euro</button>
                                <button onclick="checkSlideAnswer(this, false, 'Hitung kembali perkalian komisinya.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">1000 Euro</button>
                            </div>
                        </div>
                    </div>
                `
            },
            // Slide 28: Soal Cerita 5
            {
                section: "Soal Cerita",
                title: "Ketinggian Gelombang Tsunami (HOTS)",
                subtitle: "Pemodelan ancaman bencana alam",
                icon: "🌊",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-4 items-center">
                        <div>
                            <p class="text-xs text-gray-600 leading-relaxed font-semibold">
                                Profil ketinggian gelombang air laut $h(x)$ dalam meter selama mendekati bibir pantai dimodelkan oleh persamaan suku banyak pangkat tiga berikut:
                                <br><br>
                                <strong class="text-violet-700 font-mono">$$h(x) = x^3 - 3x^2 - 10x$$</strong>
                                <br>
                                di mana $x$ menyatakan jarak dalam kilometer dari detektor lepas pantai. Di jarak kilometer berapa gelombang tersebut tepat menyentuh ketinggian nol ($h(x) = 0$)?
                            </p>
                        </div>
                        <div class="bg-red-50 p-4 rounded-xl border border-red-200 text-center">
                            <p class="text-xs font-bold text-red-900 mb-2">Pilih Jarak Positif x</p>

                                <button onclick="checkSlideAnswer(this, true, 'Sangat Jenius! Faktorkan x: x(x²-3x-10) = 0 -> x(x-5)(x+2) = 0. Akar jarak positifnya adalah x = 5 km.', 20)" class="bg-white py-2 rounded border text-xs font-bold">x = 5 km</button>
                                <button onclick="checkSlideAnswer(this, false, 'Masih salah, coba hitung pemfaktoran kuadratnya.', 20)" class="bg-white py-2 rounded border text-xs font-bold">x = 2 km</button>

                    </div>
                `
            },
            // Slide 29: Refleksi
            {
                section: "Refleksi",
                title: "Evaluasi Pemahaman Aljabar",
                subtitle: "Refleksi Diri Kurikulum Merdeka",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm font-bold text-gray-600 mb-6">Pilih ikon yang paling menggambarkan tingkat kepahaman aljabarmu hari ini:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleEmotionSelect(this, 'paham')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">😎</span>
                                <span class="text-xs font-bold text-gray-600">Sangat Paham</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'latihan')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🤔</span>
                                <span class="text-xs font-bold text-gray-600">Butuh Latihan</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'siap')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🔥</span>
                                <span class="text-xs font-bold text-gray-600">Siap Ujian!</span>
                            </button>
                        </div>
                        <p id="emotion-feedback" class="text-xs font-bold text-[#059669] mt-6 min-h-[16px]"></p>
                    </div>
                `
            },
            // Slide 30: Kesimpulan
            {
                section: "Kesimpulan",
                title: "Misi Aljabar Lanjut Selesai!",
                subtitle: "You are officially a Polynomial & Function Expert!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#4C1D95] mb-1">Misi Selesai dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Luar biasa! Kamu telah melintasi dan menuntaskan 30 slide tantangan interaktif Aljabar Lanjut Kelas 11 SMA. Pertahankan ketajaman analisismu!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#8B5CF6] to-[#6D28D9] text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 ULANGI PETUALANGAN
                        </div>
                    </div>
                `
            }
        ];

        // --- 3. SYSTEM STATE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad Context
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- 5. RENDER CONTROL SYSTEM ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#8B5CF6] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress Bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Arrow States
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // Trigger Simulator Slide Action
            if (currentSlide === 19) { 
                setTimeout(visualizeCurve, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 6. USER INTERACTION & VALIDATION ---
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#8B5CF6]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#8B5CF6]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'paham') {
                feedbackText.innerText = "Luar biasa! Teorema sisa, faktor suku banyak, dan invers fungsi sudah kamu kuasai dengan sangat mantap! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'latihan') {
                feedbackText.innerText = "Semangat! Gunakan tombol 'Papan Cakar' di pojok kanan atas untuk berlatih corat-coret Horner kembali! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Sangat Hebat! Jiwa analisismu siap menghadapi ujian aljabar kelas 11 nanti! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerHTML = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- 7. DYNAMIC CURVE VISUALIZER ---
        function visualizeCurve() {
            const a = parseFloat(document.getElementById('range-a').value);
            const b = parseFloat(document.getElementById('range-b').value);
            const c = parseFloat(document.getElementById('range-c').value);

            // Update Label texts
            document.getElementById('val-a').innerText = a;
            document.getElementById('val-b').innerText = b;
            document.getElementById('val-c').innerText = c;

            // Generate Equation string
            let eq = "y = ";
            if (a !== 0) {
                if (a === 1) eq += "x³ ";
                else if (a === -1) eq += "-x³ ";
                else eq += `${a}x³ `;
            }
            if (b !== 0) {
                if (b > 0) eq += `+ ${b === 1 ? "" : b}x² `;
                else eq += `- ${b === -1 ? "" : Math.abs(b)}x² `;
            }
            if (c !== 0) {
                if (c > 0) eq += `+ ${c === 1 ? "" : c}x`;
                else eq += `- ${c === -1 ? "" : Math.abs(c)}x`;
            }
            if (a === 0 && b === 0 && c === 0) eq += "0";
            document.getElementById('equation-display').innerText = eq;

            // Draw SVG Curve Path
            const mapX = (x) => 50 + x * 8;
            const mapY = (y) => 50 - y * 4; 

            let pathD = "";
            for (let x = -5; x <= 5; x += 0.2) {
                const y = a * x * x * x + b * x * x + c * x;
                const sx = mapX(x);
                const sy = mapY(y);
                const boundedSy = Math.max(5, Math.min(95, sy));
                
                if (x === -5) {
                    pathD += `M ${sx} ${boundedSy}`;
                } else {
                    pathD += ` L ${sx} ${boundedSy}`;
                }
            }
            document.getElementById('svg-parabola').setAttribute('d', pathD);
        }

        // --- 8. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#8B5CF6'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 9. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- 10. CONFETTI CELEBRATION SYSTEM ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
